<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0b0d" />
    <meta name="description" content="Sortare foto cu AI, integral locala — pozele nu parasesc dispozitivul." />
    <link rel="icon" type="image/png" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LuminCuller" />
    <title>Lumin Culler Pro — sortare foto AI</title>
    <script>
      // Setat sincron, inainte de orice randare, ca sa nu clipeasca tema
      // gresita o fractiune de secunda la incarcare (FOUC) — citeste direct
      // localStorage, fara sa astepte bootstrap-ul React/Zustand.
      (function () {
        try {
          if (localStorage.getItem('lumin-theme') === 'light') {
            document.documentElement.dataset.theme = 'light';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

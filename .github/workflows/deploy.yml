# Build + deploy automat la GitHub Pages.
name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      # Copiaza modelele ML din pachet in build — nu trebuie sa urci .bin-uri in repo.
      # centernet = detectie de obiecte generale (COCO-80: caine, masina, tort, barca...),
      # folosita pentru etichete automate/export XMP — acelasi pachet Human, niciun model extern nou.
      - name: Bundle ML models
        run: |
          mkdir -p public/models
          for m in blazeface facemesh iris emotion faceres centernet; do
            cp node_modules/@vladmandic/human/models/$m.json public/models/
            cp node_modules/@vladmandic/human/models/$m.bin public/models/
          done
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
